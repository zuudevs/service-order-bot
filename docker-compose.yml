version: "3.8"

services:
  # Service Order API (the backend)
  service-order-api:
    image: ghcr.io/zuudevs/service-order-api:latest
    # Or build locally:
    # build:
    #   context: ../service-order-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - INTERNAL_API_TOKEN_HASH=${INTERNAL_API_TOKEN_HASH}
    volumes:
      - api-storage:/app/storage
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Telegram Bot
  service-order-bot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SERVICE_ORDER_API_URL=http://service-order-api:8080
      - SERVICE_ORDER_API_TOKEN=${SERVICE_ORDER_API_TOKEN}
      - ALLOWED_TELEGRAM_USER_IDS=${ALLOWED_TELEGRAM_USER_IDS}
      - BOT_DEBUG=${BOT_DEBUG:-false}
    depends_on:
      service-order-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  api-storage: